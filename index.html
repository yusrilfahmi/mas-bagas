<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Laporan Perawatan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="preview-section">
            <div class="document-preview" id="document-to-pdf">
                <div class="doc-title" id="preview-judul">PERAWATAN KENDARAAN OPERASIONAL PERSAMPAHAN</div>
                <div class="doc-subtitle" id="preview-waktu">BULAN JANUARI 2026</div>
                <div class="doc-image-container">
                    <img id="preview-image" src="" alt="Preview Gambar">
                </div>
            </div>
        </div>

        <div class="control-section">
            <div class="form-group">
                <label for="input-judul">Judul Dokumen</label>
                <input type="text" id="input-judul" class="form-control" placeholder="Contoh: PERAWATAN KENDARAAN..." value="PERAWATAN KENDARAAN OPERASIONAL PERSAMPAHAN">
            </div>

            <div class="form-group">
                <label for="input-waktu">Waktu (Update)</label>
                <input type="text" id="input-waktu" class="form-control" placeholder="Contoh: BULAN JANUARI 2026" value="BULAN JANUARI 2026">
            </div>

            <div class="form-group">
                <label>Upload Gambar</label>
                <label class="upload-area" for="input-gambar">
                    <span id="upload-text">Klik untuk memilih gambar</span>
                    <input type="file" id="input-gambar" accept="image/*">
                </label>
            </div>

            <button class="btn-download" id="btn-download">Download PDF</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
